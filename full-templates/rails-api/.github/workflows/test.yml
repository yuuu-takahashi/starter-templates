# Generated by scripts/generate-configs.ts — edit shared/workflows/test-rails-api.yml instead.
name: test

on:
  pull_request:
  push:
    branches: [main]
defaults:
  run:
    shell: bash
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    container:
      image: ruby:3.3.6

    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-ruby-bundle

      - name: Run tests
        run: |
          cp .env.test .env
          bundle exec rails db:create db:migrate
          bundle exec rspec
