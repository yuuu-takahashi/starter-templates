# Generated by scripts/generate-configs.ts — edit shared/workflows/ci-e2e-nextjs.yml instead.
# Reusable workflow for E2E tests. Called from ci.yml.
name: CI - E2E

on:
  workflow_call:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and Install Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          frozen-lockfile: 'false'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        run: |
          set +e
          yarn test:e2e 2>&1 | tee playwright-output.log
          exit_code="${PIPESTATUS[0]}"
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

          if [ "${exit_code}" -ne 0 ]; then
            {
              echo "## E2E Test Results 🎭"
              echo ""
              echo "❌ Tests failed with exit code: ${exit_code}"
              echo ""
              echo "### Error Details"
              echo '```'
              tail -n 50 "playwright-output.log"
              echo '```'
              echo ""
              echo "📊 Full logs and detailed results are available in the artifacts below."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## E2E Test Results 🎭"
              echo ""
              echo "✅ All tests passed!"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Playwright HTML report
        if: steps.playwright.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: ${{ github.ref == 'refs/heads/main' && 7 || 3 }}
          compression-level: 9

      - name: Upload Playwright test results
        if: steps.playwright.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          retention-days: ${{ github.ref == 'refs/heads/main' && 7 || 3 }}
          compression-level: 9

      - name: Fail on E2E failures
        if: steps.playwright.outputs.exit_code != '0' && github.event_name == 'pull_request'
        run: |
          echo "::error::E2E tests failed with exit code: ${{ steps.playwright.outputs.exit_code }}"
          if [ -f "playwright-output.log" ]; then
            tail -n 30 "playwright-output.log"
          fi
          exit 1

      - name: Warn on main branch failures
        if: steps.playwright.outputs.exit_code != '0' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "::warning::E2E tests failed on main branch push"
