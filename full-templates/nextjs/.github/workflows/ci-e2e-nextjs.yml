# Generated by scripts/commands/generate-configs.ts — edit shared/ci/workflows/ci-e2e-nextjs.yml instead.
# Reusable workflow for E2E tests. Called from ci.yml.
name: CI - E2E

on:
  workflow_call:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and Install Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          frozen-lockfile: 'false'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: |
          yarn test:e2e 2>&1 | tee playwright-output.log

      - name: E2E 結果サマリ
        if: failure()
        run: |
          {
            echo "## E2E Test Results 🎭"
            echo ""
            echo "❌ Tests failed"
            echo ""
            echo "### Error Details"
            echo '```'
            tail -n 50 "playwright-output.log" 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: ${{ github.ref == 'refs/heads/main' && 7 || 3 }}
          compression-level: 9

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          retention-days: ${{ github.ref == 'refs/heads/main' && 7 || 3 }}
          compression-level: 9

      - name: Warn on main branch failures
        if: failure() && github.ref == 'refs/heads/main'
        run: echo "::warning::E2E tests failed on main branch push"
