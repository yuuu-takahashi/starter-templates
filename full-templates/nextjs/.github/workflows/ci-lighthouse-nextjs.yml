# Generated by scripts/commands/generate-configs.ts — edit shared/ci/workflows/ci-lighthouse-nextjs.yml instead.
# Reusable workflow for Lighthouse CI. Called from ci.yml.
name: CI - Lighthouse

on:
  workflow_call:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Node.js and Install Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          frozen-lockfile: 'false'

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/yarn.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build
        run: yarn build

      - name: Run Lighthouse CI
        run: yarn lhci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 14
          include-hidden-files: true
