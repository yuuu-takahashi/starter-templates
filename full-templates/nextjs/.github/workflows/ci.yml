# Generated by scripts/generate-configs.ts — edit shared/workflows/ci-nextjs-full.yml instead.
name: CI

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.head_ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: read
      pull-requests: read
    outputs:
      src: ${{ steps.filter.outputs.src }}
      e2e: ${{ steps.filter.outputs.e2e }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'package.json'
              - 'yarn.lock'
              - '.node-version'
            e2e:
              - 'src/**'
              - 'playwright.config.*'
              - '**/e2e/**'
              - 'package.json'
            frontend:
              - 'src/**'
              - 'next.config.*'
              - 'package.json'
              - 'yarn.lock'

  code-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Node.js and Install Dependencies
        uses: ./.github/actions/setup-node-yarn

      - name: format
        run: yarn format

      - name: lint
        run: yarn lint

      - name: markuplint
        run: yarn markuplint

  test:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and Install Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          frozen-lockfile: 'false'

      - name: test
        run: yarn test

  e2e:
    needs: [changes, code-check, test]
    if: |
      always() &&
      needs.changes.outputs.e2e == 'true' &&
      needs.code-check.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (github.base_ref == 'main' || github.ref == 'refs/heads/main')
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/ci-e2e-nextjs.yml

  lighthouse:
    needs: [changes, code-check, test]
    if: |
      always() &&
      needs.changes.outputs.frontend == 'true' &&
      needs.code-check.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (github.base_ref == 'main' || github.ref == 'refs/heads/main')
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/ci-lighthouse-nextjs.yml
