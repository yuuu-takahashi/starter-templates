# Generated by scripts/commands/generate-configs.ts — edit shared/ci/workflows/code-check-nextjs-full.yml instead.
name: Code Check

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'yarn'

      - name: Install dependencies
        env:
          HUSKY: '0'
        run: yarn install

      - name: format
        run: yarn format

      - name: lint
        run: yarn lint

      - name: markuplint
        run: yarn markuplint

      - name: markdownlint
        run: yarn markdownlint

      - name: type-check
        run: yarn type-check

      - name: knip
        run: yarn knip
