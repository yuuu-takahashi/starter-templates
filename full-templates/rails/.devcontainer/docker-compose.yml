# Generated by scripts/generate-devcontainer.ts — edit shared/docker/docker-compose.rails.yml instead.
services:
  web:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        TZ: ${TZ:-UTC}
        CLAUDE_CODE_VERSION: latest
    volumes:
      - ..:/workspace
      - node_modules_cache:/workspace/node_modules
      - gem_cache:/workspace/vendor/bundle
    environment:
      RAILS_ENV: development
      BUNDLE_PATH: /vendor/bundle
      BUNDLER_VERSION: 2.3.7
    tty: true
    stdin_open: true
    command: /bin/sh -c "yarn install && bundle install && sleep infinity"

volumes:
  node_modules_cache:
  gem_cache:
