name: Test

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      nextjs: ${{ steps.filter.outputs.nextjs }}
      reactjs: ${{ steps.filter.outputs.reactjs }}
      rails: ${{ steps.filter.outputs.rails }}
      rails_api: ${{ steps.filter.outputs.rails_api }}
      sinatra: ${{ steps.filter.outputs.sinatra }}
      laravel: ${{ steps.filter.outputs.laravel }}
      csharp: ${{ steps.filter.outputs.csharp }}
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
      django: ${{ steps.filter.outputs.django }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nextjs:
              - 'templates/nextjs/**'
            reactjs:
              - 'templates/reactjs/**'
            rails:
              - 'templates/rails/**'
            rails_api:
              - 'templates/rails-api/**'
            sinatra:
              - 'templates/sinatra/**'
            laravel:
              - 'templates/laravel/**'
            csharp:
              - 'templates/csharp/**'
            go:
              - 'templates/go/**'
            rust:
              - 'templates/rust/**'
            django:
              - 'templates/django/**'

  nextjs:
    needs: changes
    if: needs.changes.outputs.nextjs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'yarn'
          cache-dependency-path: 'templates/nextjs/yarn.lock'
      - name: Install dependencies
        run: yarn install
        working-directory: templates/nextjs
      - name: test
        run: yarn test
        working-directory: templates/nextjs

  reactjs:
    needs: changes
    if: needs.changes.outputs.reactjs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'yarn'
          cache-dependency-path: 'templates/reactjs/yarn.lock'
      - name: Install dependencies
        run: yarn install
        working-directory: templates/reactjs
      - name: test
        run: yarn test
        working-directory: templates/reactjs

  rails:
    needs: changes
    if: needs.changes.outputs.rails == 'true'
    runs-on: ubuntu-latest
    container:
      image: ruby:3.3.6
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    env:
      DATABASE_HOST: db
      DATABASE_USER: root
      DATABASE_PASSWORD: password
    steps:
      - uses: actions/checkout@v4
      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: templates/rails/vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('templates/rails/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-
      - name: Install Node.js & Yarn inside the container
        run: |
          apt-get update
          apt-get install -y curl
          curl -fsSL https://deb.nodesource.com/setup_23.x | bash -
          apt-get install -y nodejs
          npm install -g yarn
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: templates/rails/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('templates/rails/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        run: bundle install --path vendor/bundle
        working-directory: templates/rails
      - name: Install JS dependencies
        run: yarn install
        working-directory: templates/rails
      - name: Run tests
        run: |
          bin/rails db:prepare
          bundle exec rspec
        working-directory: templates/rails

  rails_api:
    needs: changes
    if: needs.changes.outputs.rails_api == 'true'
    runs-on: ubuntu-latest
    container:
      image: ruby:3.3.6
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: templates/rails-api/vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('templates/rails-api/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-
      - name: Install dependencies
        run: bundle install --path vendor/bundle
        working-directory: templates/rails-api
      - name: Run tests
        run: |
          cp .env.test .env
          bundle exec rails db:create db:migrate
          bundle exec rspec
        working-directory: templates/rails-api

  sinatra:
    needs: changes
    if: needs.changes.outputs.sinatra == 'true'
    runs-on: ubuntu-latest
    container:
      image: ruby:3.3.6
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    env:
      DATABASE_HOST: db
      DATABASE_USER: root
      DATABASE_PASSWORD: password
      DATABASE_NAME: template-sinatra_test
    steps:
      - uses: actions/checkout@v4
      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: templates/sinatra/vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('templates/sinatra/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-
      - name: Install dependencies
        run: bundle install --path vendor/bundle
        working-directory: templates/sinatra
      - name: Run tests
        run: bundle exec rspec
        working-directory: templates/sinatra

  laravel:
    needs: changes
    if: needs.changes.outputs.laravel == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/laravel
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, zip, exif, pcntl, bcmath, gd
          coverage: none
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: templates/laravel/.composer-cache
          key: ${{ runner.os }}-composer-${{ hashFiles('templates/laravel/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: COMPOSER_CACHE_DIR=.composer-cache composer install --prefer-dist --no-progress
        working-directory: templates/laravel
      - name: Prepare Laravel
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
        working-directory: templates/laravel
      - name: Run tests
        run: php artisan test
        working-directory: templates/laravel

  csharp:
    needs: changes
    if: needs.changes.outputs.csharp == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/csharp
    steps:
      - uses: actions/checkout@v4
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: templates/csharp/global.json
      - name: Restore
        run: dotnet restore
        working-directory: templates/csharp
      - name: Test
        run: dotnet test --verbosity normal
        working-directory: templates/csharp

  go:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/go
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: templates/go/.go-version
      - name: Test
        run: go test ./...
        working-directory: templates/go

  rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/rust
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: templates/rust/target
          key: ${{ runner.os }}-cargo-rust-${{ hashFiles('templates/rust/Cargo.lock', 'templates/rust/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-rust-
      - name: Test
        run: cargo test
        working-directory: templates/rust

  django:
    needs: changes
    if: needs.changes.outputs.django == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/django
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: templates/django/.python-version
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('templates/django/requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt
        working-directory: templates/django
      - name: Prepare environment
        run: cp .env.example .env
        working-directory: templates/django
      - name: Run tests
        run: |
          . .venv/bin/activate
          python manage.py test
        working-directory: templates/django
