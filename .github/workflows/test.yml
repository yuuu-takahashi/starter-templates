# Generated by yarn generate:ci - edit shared/workflows/ or template's .github/workflows/ instead.

name: Test

on:
  pull_request:

defaults:
  run:
    shell: bash

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref_name }}'
  cancel-in-progress: true
jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      nextjs: ${{ steps.filter.outputs.nextjs }}
      nodejs: ${{ steps.filter.outputs.nodejs }}
      react: ${{ steps.filter.outputs.react }}
      rails: ${{ steps.filter.outputs.rails }}
      rails_api: ${{ steps.filter.outputs.rails_api }}
      laravel: ${{ steps.filter.outputs.laravel }}
      sinatra: ${{ steps.filter.outputs.sinatra }}
      csharp: ${{ steps.filter.outputs.csharp }}
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
      django: ${{ steps.filter.outputs.django }}
      full_nextjs: ${{ steps.filter.outputs.full_nextjs }}
      full_rails_api: ${{ steps.filter.outputs.full_rails_api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |-
            nextjs:
              - 'minimal-templates/nextjs/**'
            nodejs:
              - 'minimal-templates/nodejs/**'
            react:
              - 'minimal-templates/react/**'
            rails:
              - 'minimal-templates/rails/**'
            rails_api:
              - 'minimal-templates/rails-api/**'
            laravel:
              - 'minimal-templates/laravel/**'
            sinatra:
              - 'minimal-templates/sinatra/**'
            csharp:
              - 'minimal-templates/csharp/**'
            go:
              - 'minimal-templates/go/**'
            rust:
              - 'minimal-templates/rust/**'
            django:
              - 'minimal-templates/django/**'
            full_nextjs:
              - 'full-templates/nextjs/**'
            full_rails_api:
              - 'full-templates/rails-api/**'
  nextjs:
    needs: changes
    if: needs.changes.outputs.nextjs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: yarn
          cache-dependency-path: minimal-templates/nextjs/yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: test
        run: yarn test
  nodejs:
    needs: changes
    if: needs.changes.outputs.nodejs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: yarn
          cache-dependency-path: minimal-templates/nodejs/yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: test
        run: yarn test
  react:
    needs: changes
    if: needs.changes.outputs.react == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: yarn
          cache-dependency-path: minimal-templates/react/yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: test
        run: yarn test
  rails:
    needs: changes
    if: needs.changes.outputs.rails == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: minimal-templates/rails/vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('minimal-templates/rails/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-
      - name: Install Node.js & Yarn inside the container
        run: |
          apt-get update
          apt-get install -y curl
          curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
          apt-get install -y nodejs
          npm install -g yarn
        working-directory: minimal-templates/rails
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: minimal-templates/rails/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('minimal-templates/rails/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        run: bundle install --path vendor/bundle
        working-directory: minimal-templates/rails
      - name: Install JS dependencies
        run: yarn install
        working-directory: minimal-templates/rails
      - name: Run tests
        run: |
          bin/rails db:prepare
          bundle exec rspec
        working-directory: minimal-templates/rails
    container:
      image: ruby:3.3.6
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    env:
      DATABASE_HOST: db
      DATABASE_USER: root
      DATABASE_PASSWORD: password
  rails_api:
    needs: changes
    if: needs.changes.outputs.rails_api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: minimal-templates/rails-api/vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('minimal-templates/rails-api/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-
      - name: Install dependencies
        run: bundle install --path vendor/bundle
        working-directory: minimal-templates/rails-api
      - name: Run tests
        run: |
          cp .env.test .env
          bundle exec rails db:create db:migrate
          bundle exec rspec
        working-directory: minimal-templates/rails-api
    container:
      image: ruby:3.3.6
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
  laravel:
    needs: changes
    if: needs.changes.outputs.laravel == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, zip, exif, pcntl, bcmath, gd
          coverage: none
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: minimal-templates/laravel/.composer-cache
          key: ${{ runner.os }}-composer-${{ hashFiles('minimal-templates/laravel/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: COMPOSER_CACHE_DIR=.composer-cache composer install --prefer-dist --no-progress
        working-directory: minimal-templates/laravel
      - name: Prepare Laravel
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
        working-directory: minimal-templates/laravel
      - name: Run tests
        run: php artisan test
        working-directory: minimal-templates/laravel
  sinatra:
    needs: changes
    if: needs.changes.outputs.sinatra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: minimal-templates/sinatra/vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('minimal-templates/sinatra/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-
      - name: Install dependencies
        run: bundle install --path vendor/bundle
        working-directory: minimal-templates/sinatra
      - name: Run tests
        run: |
          bundle exec rspec
        working-directory: minimal-templates/sinatra
    container:
      image: ruby:3.3.6
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    env:
      APP_ENV: test
      RACK_ENV: test
      DATABASE_HOST: db
      DATABASE_USER: root
      DATABASE_PASSWORD: password
      DATABASE_NAME: template-sinatra_test
  csharp:
    needs: changes
    if: needs.changes.outputs.csharp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: minimal-templates/csharp/global.json
      - name: Restore
        run: dotnet restore
        working-directory: minimal-templates/csharp
      - name: Test
        run: dotnet test --verbosity normal
        working-directory: minimal-templates/csharp
  go:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: minimal-templates/go/.go-version
      - name: Tidy
        run: go mod tidy
        working-directory: minimal-templates/go
      - name: Test
        run: go test ./...
        working-directory: minimal-templates/go
  rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: minimal-templates/rust/target
          key: ${{ runner.os }}-cargo-rust-${{ hashFiles('minimal-templates/rust/Cargo.lock', 'minimal-templates/rust/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-rust-
      - name: Test
        run: cargo test
        working-directory: minimal-templates/rust
  django:
    needs: changes
    if: needs.changes.outputs.django == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: minimal-templates/django/.python-version
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('minimal-templates/django/requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt
        working-directory: minimal-templates/django
      - name: Prepare environment
        run: |
          cp .env.example .env
        working-directory: minimal-templates/django
      - name: Run tests
        run: |
          . .venv/bin/activate
          python manage.py test
        working-directory: minimal-templates/django
  full_nextjs:
    needs: changes
    if: needs.changes.outputs.full_nextjs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: yarn
          cache-dependency-path: full-templates/nextjs/yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: test
        run: yarn test
  full_rails_api:
    needs: changes
    if: needs.changes.outputs.full_rails_api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: full-templates/rails-api/vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('full-templates/rails-api/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-
      - name: Install dependencies
        run: bundle install --path vendor/bundle
        working-directory: full-templates/rails-api
      - name: Run tests
        run: |
          cp .env.test .env
          bundle exec rails db:create db:migrate
          bundle exec rspec
        working-directory: full-templates/rails-api
    container:
      image: ruby:3.3.6
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
