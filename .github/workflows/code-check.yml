# Generated by yarn generate:ci - edit shared/workflows/ or template's .github/workflows/ instead.

name: Code Check

on:
  pull_request:

defaults:
  run:
    shell: bash

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref_name }}'
  cancel-in-progress: true
jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      nextjs: ${{ steps.filter.outputs.nextjs }}
      nodejs: ${{ steps.filter.outputs.nodejs }}
      react: ${{ steps.filter.outputs.react }}
      rails: ${{ steps.filter.outputs.rails }}
      rails_api: ${{ steps.filter.outputs.rails_api }}
      laravel: ${{ steps.filter.outputs.laravel }}
      sinatra: ${{ steps.filter.outputs.sinatra }}
      ruby: ${{ steps.filter.outputs.ruby }}
      csharp: ${{ steps.filter.outputs.csharp }}
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
      django: ${{ steps.filter.outputs.django }}
      full_nextjs: ${{ steps.filter.outputs.full_nextjs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |-
            nextjs:
              - 'minimal-templates/nextjs/**'
            nodejs:
              - 'minimal-templates/nodejs/**'
            react:
              - 'minimal-templates/react/**'
            rails:
              - 'minimal-templates/rails/**'
            rails_api:
              - 'minimal-templates/rails-api/**'
            laravel:
              - 'minimal-templates/laravel/**'
            sinatra:
              - 'minimal-templates/sinatra/**'
            ruby:
              - 'minimal-templates/ruby/**'
            csharp:
              - 'minimal-templates/csharp/**'
            go:
              - 'minimal-templates/go/**'
            rust:
              - 'minimal-templates/rust/**'
            django:
              - 'minimal-templates/django/**'
            full_nextjs:
              - 'full-templates/nextjs/**'
  generate_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: Lint
        run: yarn lint
      - name: Run tests
        run: yarn test
      - name: Run generate:all
        run: yarn generate:all
      - name: Check for uncommitted changes
        run: git diff --exit-code
  nextjs:
    needs: changes
    if: needs.changes.outputs.nextjs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: minimal-templates/nextjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: yarn
          cache-dependency-path: minimal-templates/nextjs/yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: format
        run: yarn format
      - name: lint
        run: yarn lint
  nodejs:
    needs: changes
    if: needs.changes.outputs.nodejs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: minimal-templates/nodejs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: yarn
          cache-dependency-path: minimal-templates/nodejs/yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: format
        run: yarn format
      - name: lint
        run: yarn lint
  react:
    needs: changes
    if: needs.changes.outputs.react == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: minimal-templates/react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: yarn
          cache-dependency-path: minimal-templates/react/yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: format
        run: yarn format
      - name: lint
        run: yarn lint
  rails:
    needs: changes
    if: needs.changes.outputs.rails == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
      - uses: actions/cache@v4
        with:
          path: minimal-templates/rails/node_modules
          key: ${{ runner.os }}-yarn-minimal-templates/rails-${{ hashFiles('minimal-templates/rails/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-minimal-templates/rails-
      - name: yarn format & lint
        run: cd minimal-templates/rails && yarn install && yarn format
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.6
          working-directory: minimal-templates/rails
          bundler-cache: true
      - name: rubocop
        run: bundle exec rubocop
        working-directory: minimal-templates/rails
      - name: erb_lint
        run: bundle exec erb_lint app/views/**/*.erb
        working-directory: minimal-templates/rails
      - name: htmlbeautifier
        run: find app/views -name "*.erb" -exec bundle exec htmlbeautifier {} \;
        working-directory: minimal-templates/rails
  rails_api:
    needs: changes
    if: needs.changes.outputs.rails_api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
      - uses: actions/cache@v4
        with:
          path: minimal-templates/rails-api/node_modules
          key: ${{ runner.os }}-yarn-minimal-templates/rails-api-${{ hashFiles('minimal-templates/rails-api/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-minimal-templates/rails-api-
      - name: yarn format & lint
        run: cd minimal-templates/rails-api && yarn install && yarn format
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.6
          working-directory: minimal-templates/rails-api
          bundler-cache: true
      - name: rubocop
        run: bundle exec rubocop
        working-directory: minimal-templates/rails-api
  laravel:
    needs: changes
    if: needs.changes.outputs.laravel == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: minimal-templates/laravel
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, zip, exif, pcntl, bcmath, gd
          coverage: none
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: minimal-templates/laravel/.composer-cache
          key: ${{ runner.os }}-composer-${{ hashFiles('minimal-templates/laravel/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: COMPOSER_CACHE_DIR=.composer-cache composer install --prefer-dist --no-progress
        working-directory: minimal-templates/laravel
      - name: Laravel Pint (format & lint)
        run: ./vendor/bin/pint --test
        working-directory: minimal-templates/laravel
  sinatra:
    needs: changes
    if: needs.changes.outputs.sinatra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
      - uses: actions/cache@v4
        with:
          path: minimal-templates/sinatra/node_modules
          key: ${{ runner.os }}-yarn-minimal-templates/sinatra-${{ hashFiles('minimal-templates/sinatra/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-minimal-templates/sinatra-
      - name: yarn format & lint
        run: cd minimal-templates/sinatra && yarn install && yarn format
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.6
          working-directory: minimal-templates/sinatra
          bundler-cache: true
      - name: rubocop
        run: bundle exec rubocop
        working-directory: minimal-templates/sinatra
      - name: erb_lint
        run: bundle exec erb_lint app/views/**/*.erb
        working-directory: minimal-templates/sinatra
      - name: htmlbeautifier
        run: find app/views -name "*.erb" -exec bundle exec htmlbeautifier {} \;
        working-directory: minimal-templates/sinatra
  ruby:
    needs: changes
    if: needs.changes.outputs.ruby == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
      - uses: actions/cache@v4
        with:
          path: minimal-templates/ruby/node_modules
          key: ${{ runner.os }}-yarn-minimal-templates/ruby-${{ hashFiles('minimal-templates/ruby/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-minimal-templates/ruby-
      - name: yarn format & lint
        run: cd minimal-templates/ruby && yarn install && yarn format
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.6
          working-directory: minimal-templates/ruby
          bundler-cache: true
      - name: rubocop
        run: bundle exec rubocop
        working-directory: minimal-templates/ruby
  csharp:
    needs: changes
    if: needs.changes.outputs.csharp == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: minimal-templates/csharp
    steps:
      - uses: actions/checkout@v4
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: minimal-templates/csharp/global.json
      - name: Restore
        run: dotnet restore
        working-directory: minimal-templates/csharp
      - name: Build
        run: dotnet build --no-restore
        working-directory: minimal-templates/csharp
  go:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: minimal-templates/go
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: minimal-templates/go/.go-version
      - name: Download Go modules
        run: go mod download
        working-directory: minimal-templates/go
      - name: Tidy Go modules
        run: go mod tidy
        working-directory: minimal-templates/go
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          "$(go env GOPATH)/bin/golangci-lint" run
        working-directory: minimal-templates/go
      - name: Build
        run: go build ./...
        working-directory: minimal-templates/go
  rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: minimal-templates/rust
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: minimal-templates/rust/target
          key: ${{ runner.os }}-cargo-rust-${{ hashFiles('minimal-templates/rust/Cargo.lock', 'minimal-templates/rust/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-rust-
      - name: Check format
        run: cargo fmt --all -- --check
        working-directory: minimal-templates/rust
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: minimal-templates/rust
      - name: Build
        run: cargo build
        working-directory: minimal-templates/rust
  django:
    needs: changes
    if: needs.changes.outputs.django == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: minimal-templates/django
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: minimal-templates/django/.python-version
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('minimal-templates/django/requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt
          pip install ruff black
        working-directory: minimal-templates/django
      - name: Ruff
        run: |
          . .venv/bin/activate
          ruff check .
        working-directory: minimal-templates/django
      - name: Black
        run: |
          . .venv/bin/activate
          black --check .
        working-directory: minimal-templates/django
  full_nextjs:
    needs: changes
    if: needs.changes.outputs.full_nextjs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: full-templates/nextjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: yarn
          cache-dependency-path: full-templates/nextjs/yarn.lock
      - name: Install dependencies
        env:
          HUSKY: "0"
        run: yarn install
      - name: format
        run: yarn format
      - name: lint
        run: yarn lint
      - name: markuplint
        run: yarn markuplint
      - name: markdownlint
        run: yarn markdownlint
      - name: type-check
        run: yarn type-check
      - name: knip
        run: yarn knip
