          key: ${{ runner.os }}-yarn-minimal-templates/rails-api-${{ hashFiles('minimal-templates/rails-api/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-minimal-templates/rails-api-
      - name: yarn format & lint
        run: cd minimal-templates/rails-api && yarn install && yarn format
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.6
          working-directory: minimal-templates/rails-api
          bundler-cache: true
      - name: rubocop
        run: bundle exec rubocop
        working-directory: minimal-templates/rails-api
  sinatra:
    needs: changes
    if: needs.changes.outputs.sinatra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
      - uses: actions/cache@v4
        with:
          path: minimal-templates/sinatra/node_modules
          key: ${{ runner.os }}-yarn-minimal-templates/sinatra-${{ hashFiles('minimal-templates/sinatra/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-minimal-templates/sinatra-
      - name: yarn format & lint
        run: cd minimal-templates/sinatra && yarn install && yarn format
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.6
          working-directory: minimal-templates/sinatra
          bundler-cache: true
      - name: rubocop
        run: bundle exec rubocop
        working-directory: minimal-templates/sinatra
      - name: erb_lint
        run: bundle exec erb_lint app/views/**/*.erb
        working-directory: minimal-templates/sinatra
      - name: htmlbeautifier
        run: find app/views -name "*.erb" -exec bundle exec htmlbeautifier {} \;
        working-directory: minimal-templates/sinatra
  ruby:
    needs: changes
    if: needs.changes.outputs.ruby == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
      - uses: actions/cache@v4
        with:
          path: minimal-templates/ruby/node_modules
          key: ${{ runner.os }}-yarn-minimal-templates/ruby-${{ hashFiles('minimal-templates/ruby/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-minimal-templates/ruby-
      - name: yarn format & lint
        run: cd minimal-templates/ruby && yarn install && yarn format
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.6
          working-directory: minimal-templates/ruby
          bundler-cache: true
      - name: rubocop
        run: bundle exec rubocop
        working-directory: minimal-templates/ruby
  full_nextjs:
    needs: changes
    if: needs.changes.outputs.full_nextjs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: full-templates/nextjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: yarn
          cache-dependency-path: full-templates/nextjs/yarn.lock
      - name: Install dependencies
        env:
          HUSKY: "0"
        run: yarn install
      - name: format
        run: yarn format
      - name: lint
        run: yarn lint
      - name: markuplint
        run: yarn markuplint
      - name: markdownlint
        run: yarn markdownlint
      - name: type-check
        run: yarn type-check
      - name: knip
        run: yarn knip
  full_rails_api:
    needs: changes
    if: needs.changes.outputs.full_rails_api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
      - uses: actions/cache@v4
        with:
          path: full-templates/rails-api/node_modules
          key: ${{ runner.os }}-yarn-full-templates/rails-api-${{ hashFiles('full-templates/rails-api/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-full-templates/rails-api-
      - name: yarn format & lint
        run: cd full-templates/rails-api && yarn install && yarn format
      - uses: ruby/setup-ruby@v1
        with:
