# Generated by npm run generate:ci - edit each template's .github/workflows/code-check.yml instead.

name: Code Check

on:
  pull_request:
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.ref_name }}"
  cancel-in-progress: true
jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      nextjs: ${{ steps.filter.outputs.nextjs }}
      nodejs: ${{ steps.filter.outputs.nodejs }}
      react: ${{ steps.filter.outputs.react }}
      rails: ${{ steps.filter.outputs.rails }}
      rails_api: ${{ steps.filter.outputs.rails_api }}
      sinatra: ${{ steps.filter.outputs.sinatra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |-
            nextjs:
              - 'templates/nextjs/**'
            nodejs:
              - 'templates/nodejs/**'
            react:
              - 'templates/react/**'
            rails:
              - 'templates/rails/**'
            rails_api:
              - 'templates/rails-api/**'
            sinatra:
              - 'templates/sinatra/**'
  generate_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: Run generate:all
        run: yarn generate:all
      - name: Check for uncommitted changes
        run: git diff --exit-code
  nextjs:
    needs: changes
    if: needs.changes.outputs.nextjs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/nextjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: yarn
          cache-dependency-path: templates/nextjs/yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: format
        run: yarn format
      - name: lint
        run: yarn lint
  nodejs:
    needs: changes
    if: needs.changes.outputs.nodejs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/nodejs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: yarn
          cache-dependency-path: templates/nodejs/yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: format
        run: yarn format
      - name: lint
        run: yarn lint
  react:
    needs: changes
    if: needs.changes.outputs.react == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: yarn
          cache-dependency-path: templates/react/yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: format
        run: yarn format
      - name: lint
        run: yarn lint
  rails:
    needs: changes
    if: needs.changes.outputs.rails == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: yarn
          cache-dependency-path: templates/rails/yarn.lock
      - name: yarn format & lint
        run: cd templates/rails && yarn install && yarn format
      - uses: ruby/setup-ruby@v1
        with:
          working-directory: templates/rails
          bundler-cache: true
      - name: rubocop
        run: bundle exec rubocop -A
        working-directory: templates/rails
      - name: erb_lint
        run: bundle exec erb_lint app/views/**/*.erb
        working-directory: templates/rails
      - name: htmlbeautifier
        run: find app/views -name "*.erb" -exec bundle exec htmlbeautifier {} \;
        working-directory: templates/rails
  rails_api:
    needs: changes
    if: needs.changes.outputs.rails_api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: yarn
          cache-dependency-path: templates/rails-api/yarn.lock
      - name: yarn format & lint
        run: cd templates/rails-api && yarn install && yarn format
      - uses: ruby/setup-ruby@v1
        with:
          working-directory: templates/rails-api
          bundler-cache: true
      - name: rubocop
        run: bundle exec rubocop -A
        working-directory: templates/rails-api
  sinatra:
    needs: changes
    if: needs.changes.outputs.sinatra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: yarn
          cache-dependency-path: templates/sinatra/yarn.lock
      - name: yarn format & lint
        run: cd templates/sinatra && yarn install && yarn format
      - uses: ruby/setup-ruby@v1
        with:
          working-directory: templates/sinatra
          bundler-cache: true
      - name: rubocop
        run: bundle exec rubocop -A
        working-directory: templates/sinatra
      - name: erb_lint
        run: bundle exec erb_lint app/views/**/*.erb
        working-directory: templates/sinatra
      - name: htmlbeautifier
        run: find app/views -name "*.erb" -exec bundle exec htmlbeautifier {} \;
        working-directory: templates/sinatra
