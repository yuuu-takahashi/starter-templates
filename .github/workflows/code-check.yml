# Generated by npm run generate:ci - edit each template's .github/workflows/code-check.yml instead.

name: Code Check

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      nextjs: ${{ steps.filter.outputs.nextjs }}
      react: ${{ steps.filter.outputs.react }}
      rails: ${{ steps.filter.outputs.rails }}
      rails_api: ${{ steps.filter.outputs.rails_api }}
      sinatra: ${{ steps.filter.outputs.sinatra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nextjs:
              - 'nextjs/**'
            react:
              - 'react/**'
            rails:
              - 'rails/**'
            rails_api:
              - 'rails-api/**'
            sinatra:
              - 'sinatra/**'

  nextjs:
    needs: changes
    if: needs.changes.outputs.nextjs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "yarn"
          cache-dependency-path: "nextjs/yarn.lock"
      - name: Install dependencies
        run: yarn install
      - name: format
        run: yarn format
      - name: lint
        run: yarn lint
      - name: test
        run: yarn test
      - name: build
        run: yarn build

  react:
    needs: changes
    if: needs.changes.outputs.react == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "yarn"
          cache-dependency-path: "react/yarn.lock"
      - name: Install dependencies
        run: yarn install
      - name: format
        run: yarn format
      - name: lint
        run: yarn lint

  rails:
    needs: changes
    if: needs.changes.outputs.rails == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "yarn"
          cache-dependency-path: "rails/yarn.lock"
      - name: yarn format & lint
        run: cd rails && yarn install && yarn format && yarn lint
      - uses: ruby/setup-ruby@v1
        with:
          working-directory: "rails"
          bundler-cache: true
      - name: rubocop
        run: bundle exec rubocop -A
        working-directory: rails
      - name: erb_lint
        run: bundle exec erb_lint app/views/**/*.erb
        working-directory: rails
      - name: htmlbeautifier
        run: find app/views -name "*.erb" -exec bundle exec htmlbeautifier {} \;
        working-directory: rails

  rails_api:
    needs: changes
    if: needs.changes.outputs.rails_api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "yarn"
          cache-dependency-path: "rails-api/yarn.lock"
      - name: yarn format & lint
        run: cd rails-api && yarn install && yarn format
      - uses: ruby/setup-ruby@v1
        with:
          working-directory: "rails-api"
          bundler-cache: true
      - name: rubocop
        run: bundle exec rubocop -A
        working-directory: rails-api

  sinatra:
    needs: changes
    if: needs.changes.outputs.sinatra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "yarn"
          cache-dependency-path: "sinatra/yarn.lock"
      - name: yarn format & lint
        run: cd sinatra && yarn install && yarn format
      - uses: ruby/setup-ruby@v1
        with:
          working-directory: "sinatra"
          bundler-cache: true
      - name: rubocop
        run: bundle exec rubocop -A
        working-directory: sinatra
      - name: erb_lint
        run: bundle exec erb_lint app/views/**/*.erb
        working-directory: sinatra
      - name: htmlbeautifier
        run: find app/views -name "*.erb" -exec bundle exec htmlbeautifier {} \;
        working-directory: sinatra