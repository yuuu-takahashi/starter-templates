# Generated by yarn generate:ci - edit shared/workflows/ or template's .github/workflows/ instead.

name: Code Check

on:
  pull_request:

defaults:
  run:
    shell: bash

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref_name }}'
  cancel-in-progress: true
jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      nextjs: ${{ steps.filter.outputs.nextjs }}
      nodejs: ${{ steps.filter.outputs.nodejs }}
      react: ${{ steps.filter.outputs.react }}
      rails: ${{ steps.filter.outputs.rails }}
      rails_api: ${{ steps.filter.outputs.rails_api }}
      sinatra: ${{ steps.filter.outputs.sinatra }}
      ruby: ${{ steps.filter.outputs.ruby }}
      full_nextjs: ${{ steps.filter.outputs.full_nextjs }}
      full_rails_api: ${{ steps.filter.outputs.full_rails_api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |-
            nextjs:
              - 'minimal-templates/nextjs/**'
            nodejs:
              - 'minimal-templates/nodejs/**'
            react:
              - 'minimal-templates/react/**'
            rails:
              - 'minimal-templates/rails/**'
            rails_api:
              - 'minimal-templates/rails-api/**'
            sinatra:
              - 'minimal-templates/sinatra/**'
            ruby:
              - 'minimal-templates/ruby/**'
            full_nextjs:
              - 'full-templates/nextjs/**'
            full_rails_api:
              - 'full-templates/rails-api/**'
  generate_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: Lint
        run: yarn lint
      - name: Run tests
        run: yarn test
      - name: Run generate:all
        run: yarn generate:all
      - name: Check for uncommitted changes
        run: git diff --exit-code
  nextjs:
    needs: changes
    if: needs.changes.outputs.nextjs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: minimal-templates/nextjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: yarn
          cache-dependency-path: minimal-templates/nextjs/yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: format
        run: yarn format
      - name: lint
        run: yarn lint
  nodejs:
    needs: changes
    if: needs.changes.outputs.nodejs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: minimal-templates/nodejs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: yarn
          cache-dependency-path: minimal-templates/nodejs/yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: format
        run: yarn format
      - name: lint
        run: yarn lint
  react:
    needs: changes
    if: needs.changes.outputs.react == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: minimal-templates/react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: yarn
          cache-dependency-path: minimal-templates/react/yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: format
        run: yarn format
      - name: lint
        run: yarn lint
  rails:
    needs: changes
    if: needs.changes.outputs.rails == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
      - uses: actions/cache@v4
        with:
          path: minimal-templates/rails/node_modules
          key: ${{ runner.os }}-yarn-minimal-templates/rails-${{ hashFiles('minimal-templates/rails/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-minimal-templates/rails-
      - name: yarn format & lint
        run: cd minimal-templates/rails && yarn install && yarn format
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.6
          working-directory: minimal-templates/rails
          bundler-cache: true
      - name: rubocop
        run: bundle exec rubocop
        working-directory: minimal-templates/rails
      - name: erb_lint
        run: bundle exec erb_lint app/views/**/*.erb
        working-directory: minimal-templates/rails
      - name: htmlbeautifier
        run: find app/views -name "*.erb" -exec bundle exec htmlbeautifier {} \;
        working-directory: minimal-templates/rails
  rails_api:
    needs: changes
    if: needs.changes.outputs.rails_api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
