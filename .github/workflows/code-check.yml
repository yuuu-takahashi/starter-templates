# Generated by npm run generate:ci - edit each template's .github/workflows/code-check.yml instead.

name: Code Check

on:
  pull_request:
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.ref_name }}"
  cancel-in-progress: true
jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      nextjs: ${{ steps.filter.outputs.nextjs }}
      nodejs: ${{ steps.filter.outputs.nodejs }}
      reactjs: ${{ steps.filter.outputs.reactjs }}
      rails: ${{ steps.filter.outputs.rails }}
      rails_api: ${{ steps.filter.outputs.rails_api }}
      laravel: ${{ steps.filter.outputs.laravel }}
      sinatra: ${{ steps.filter.outputs.sinatra }}
      csharp: ${{ steps.filter.outputs.csharp }}
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
      django: ${{ steps.filter.outputs.django }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |-
            nextjs:
              - 'templates/nextjs/**'
            nodejs:
              - 'templates/nodejs/**'
            reactjs:
              - 'templates/reactjs/**'
            rails:
              - 'templates/rails/**'
            rails_api:
              - 'templates/rails-api/**'
            laravel:
              - 'templates/laravel/**'
            sinatra:
              - 'templates/sinatra/**'
            csharp:
              - 'templates/csharp/**'
            go:
              - 'templates/go/**'
            rust:
              - 'templates/rust/**'
            django:
              - 'templates/django/**'
  generate_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: Run generate:all
        run: yarn generate:all
      - name: Check for uncommitted changes
        run: git diff --exit-code
  nextjs:
    needs: changes
    if: needs.changes.outputs.nextjs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/nextjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: yarn
          cache-dependency-path: templates/nextjs/yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: format
        run: yarn format
      - name: lint
        run: yarn lint
  nodejs:
    needs: changes
    if: needs.changes.outputs.nodejs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/nodejs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: yarn
          cache-dependency-path: templates/nodejs/yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: format
        run: yarn format
      - name: lint
        run: yarn lint
  reactjs:
    needs: changes
    if: needs.changes.outputs.reactjs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/reactjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: yarn
          cache-dependency-path: templates/reactjs/yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: format
        run: yarn format
      - name: lint
        run: yarn lint
  rails:
    needs: changes
    if: needs.changes.outputs.rails == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
      - uses: actions/cache@v4
        with:
          path: templates/rails/node_modules
          key: ${{ runner.os }}-yarn-templates/rails-${{ hashFiles('templates/rails/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-templates/rails-
      - name: yarn format & lint
        run: cd templates/rails && yarn install && yarn format
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.6
          working-directory: templates/rails
          bundler-cache: true
      - name: rubocop
        run: bundle exec rubocop -A
        working-directory: templates/rails
      - name: erb_lint
        run: bundle exec erb_lint app/views/**/*.erb
        working-directory: templates/rails
      - name: htmlbeautifier
        run: find app/views -name "*.erb" -exec bundle exec htmlbeautifier {} \;
        working-directory: templates/rails
  rails_api:
    needs: changes
    if: needs.changes.outputs.rails_api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
      - uses: actions/cache@v4
        with:
          path: templates/rails-api/node_modules
          key: ${{ runner.os }}-yarn-templates/rails-api-${{ hashFiles('templates/rails-api/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-templates/rails-api-
      - name: yarn format & lint
        run: cd templates/rails-api && yarn install && yarn format
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.6
          working-directory: templates/rails-api
          bundler-cache: true
      - name: rubocop
        run: bundle exec rubocop -A
        working-directory: templates/rails-api
  laravel:
    needs: changes
    if: needs.changes.outputs.laravel == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/laravel
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, zip, exif, pcntl, bcmath, gd
          coverage: none
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: templates/laravel/.composer-cache
          key: ${{ runner.os }}-composer-${{ hashFiles('templates/laravel/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: COMPOSER_CACHE_DIR=.composer-cache composer install --prefer-dist --no-progress
        working-directory: templates/laravel
      - name: Laravel Pint (format & lint)
        run: ./vendor/bin/pint --test
        working-directory: templates/laravel
  sinatra:
    needs: changes
    if: needs.changes.outputs.sinatra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
      - uses: actions/cache@v4
        with:
          path: templates/sinatra/node_modules
          key: ${{ runner.os }}-yarn-templates/sinatra-${{ hashFiles('templates/sinatra/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-templates/sinatra-
      - name: yarn format & lint
        run: cd templates/sinatra && yarn install && yarn format
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.6
          working-directory: templates/sinatra
          bundler-cache: true
      - name: rubocop
        run: bundle exec rubocop -A
        working-directory: templates/sinatra
      - name: erb_lint
        run: bundle exec erb_lint app/views/**/*.erb
        working-directory: templates/sinatra
      - name: htmlbeautifier
        run: find app/views -name "*.erb" -exec bundle exec htmlbeautifier {} \;
        working-directory: templates/sinatra
  csharp:
    needs: changes
    if: needs.changes.outputs.csharp == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/csharp
    steps:
      - uses: actions/checkout@v4
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: templates/csharp/global.json
      - name: Restore
        run: dotnet restore
        working-directory: templates/csharp
      - name: Build
        run: dotnet build --no-restore
        working-directory: templates/csharp
  go:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/go
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: templates/go/.go-version
      - name: Download Go modules
        run: go mod download
        working-directory: templates/go
      - name: Tidy Go modules
        run: go mod tidy
        working-directory: templates/go
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          "$(go env GOPATH)/bin/golangci-lint" run
        working-directory: templates/go
      - name: Build
        run: go build ./...
        working-directory: templates/go
  rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/rust
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: templates/rust/target
          key: ${{ runner.os }}-cargo-rust-${{ hashFiles('templates/rust/Cargo.lock', 'templates/rust/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-rust-
      - name: Check format
        run: cargo fmt --all -- --check
        working-directory: templates/rust
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: templates/rust
      - name: Build
        run: cargo build
        working-directory: templates/rust
  django:
    needs: changes
    if: needs.changes.outputs.django == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/django
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: templates/django/.python-version
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('templates/django/requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt
          pip install ruff black
        working-directory: templates/django
      - name: Ruff
        run: |
          . .venv/bin/activate
          ruff check .
        working-directory: templates/django
      - name: Black
        run: |
          . .venv/bin/activate
          black --check .
        working-directory: templates/django
