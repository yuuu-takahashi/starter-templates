name: Devcontainer Build

on:
  pull_request:

defaults:
  run:
    shell: bash

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref_name }}'
  cancel-in-progress: true
jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      nextjs: ${{ steps.filter.outputs.nextjs }}
      nodejs: ${{ steps.filter.outputs.nodejs }}
      reactjs: ${{ steps.filter.outputs.reactjs }}
      rails: ${{ steps.filter.outputs.rails }}
      rails_api: ${{ steps.filter.outputs.rails_api }}
      laravel: ${{ steps.filter.outputs.laravel }}
      sinatra: ${{ steps.filter.outputs.sinatra }}
      csharp: ${{ steps.filter.outputs.csharp }}
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
      django: ${{ steps.filter.outputs.django }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |-
            nextjs:
              - 'minimal-templates/nextjs/.devcontainer/**'
            nodejs:
              - 'minimal-templates/nodejs/.devcontainer/**'
            reactjs:
              - 'minimal-templates/reactjs/.devcontainer/**'
            rails:
