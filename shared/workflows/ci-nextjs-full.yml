name: CI

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        run: |
          set +e
          yarn test:e2e 2>&1 | tee playwright-output.log
          exit_code="${PIPESTATUS[0]}"
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

          if [ "${exit_code}" -ne 0 ]; then
            {
              echo "## E2E Test Results 🎭"
              echo ""
              echo "❌ Tests failed with exit code: ${exit_code}"
              echo ""
              echo "### Error Details"
              echo '```'
              tail -n 50 "playwright-output.log"
              echo '```'
              echo ""
              echo "📊 Full logs and detailed results are available in the artifacts below."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## E2E Test Results 🎭"
              echo ""
              echo "✅ All tests passed!"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Playwright HTML report
        if: steps.playwright.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: ${{ github.ref == 'refs/heads/main' && 7 || 3 }}
          compression-level: 9

      - name: Upload Playwright test results
        if: steps.playwright.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          retention-days: ${{ github.ref == 'refs/heads/main' && 7 || 3 }}
          compression-level: 9

      - name: Fail on E2E failures
        if: steps.playwright.outputs.exit_code != '0' && github.event_name == 'pull_request'
        run: |
          echo "::error::E2E tests failed with exit code: ${{ steps.playwright.outputs.exit_code }}"
          if [ -f "playwright-output.log" ]; then
            tail -n 30 "playwright-output.log"
          fi
          exit 1

      - name: Warn on main branch failures
        if: steps.playwright.outputs.exit_code != '0' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "::warning::E2E tests failed on main branch push"

  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/yarn.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build
        run: yarn build

      - name: Run Lighthouse CI
        run: yarn lhci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 14
          include-hidden-files: true
