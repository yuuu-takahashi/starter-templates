services:
  web:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        TZ: ${TZ:-UTC}
        CLAUDE_CODE_VERSION: latest
    # node_modules / vendor/bundle はワークスペースの bind のみ（anthropics/claude-code .devcontainer と同様。DB 以外は名前付きボリュームにしない）。
    volumes:
      - ..:/workspace
    environment:
      RAILS_ENV: development
      APP_ENV: development
      RACK_ENV: development
      DATABASE_HOST: db
      DATABASE_USER: root
      DATABASE_PASSWORD: password
      DATABASE_NAME: app_development
    tty: true
    stdin_open: true
    command: ['sleep', 'infinity']
    depends_on:
      - db

  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
