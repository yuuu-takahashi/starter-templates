name: Code Check

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, zip, exif, pcntl, bcmath, gd
          coverage: none

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .composer-cache
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: COMPOSER_CACHE_DIR=.composer-cache composer install --prefer-dist --no-progress

      - name: Laravel Pint (format & lint)
        run: ./vendor/bin/pint --test
