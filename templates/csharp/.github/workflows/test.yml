# Generated by scripts/generate-configs.ts — edit shared/workflows/test-dotnet.yml instead.
name: Test

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version-file: 'global.json'

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --no-restore --verbosity normal
