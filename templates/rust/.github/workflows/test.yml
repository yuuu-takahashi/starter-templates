# Generated by scripts/generate-configs.ts — edit shared/workflows/test-rust.yml instead.
name: Test

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-rust-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-rust-

      - name: Test
        run: cargo test
