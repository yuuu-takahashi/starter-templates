# Generated by scripts/generate-configs.ts — edit shared/actions/ instead.
name: 'Setup Node.js and Install Dependencies'
description: 'Setup Node.js using .node-version and install dependencies with yarn'

inputs:
  frozen-lockfile:
    description: 'Use --frozen-lockfile flag'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.node-version'
        cache: 'yarn'

    - name: Install dependencies
      run: |
        if [ "${{ inputs.frozen-lockfile }}" = "true" ]; then
          yarn install --frozen-lockfile
        else
          yarn install
        fi
      shell: bash
