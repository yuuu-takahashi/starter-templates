# Generated by scripts/generate-configs.ts — edit shared/actions/ instead.
name: 'Setup Ruby and Install Dependencies'
description: 'Cache Ruby gems and install dependencies with bundle'

runs:
  using: 'composite'
  steps:
    - name: Cache Ruby gems
      uses: actions/cache@v4
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-gems-

    - name: Install dependencies
      run: bundle install --path vendor/bundle
      shell: bash
