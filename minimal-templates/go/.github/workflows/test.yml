# Generated by scripts/generate-configs.ts — edit shared/workflows/test-go.yml instead.
name: Test

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ".go-version"

      - name: Tidy
        run: go mod tidy

      - name: Test
        run: go test ./...
