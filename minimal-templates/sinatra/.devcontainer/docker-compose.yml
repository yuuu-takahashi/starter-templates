# Generated by scripts/commands/generate-devcontainer.ts — edit shared/config/docker/docker-compose.ruby-db.yml instead.
services:
  web:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        TZ: ${TZ:-UTC}
        CLAUDE_CODE_VERSION: latest
    volumes:
      - ..:/workspace
      - node_modules_cache:/workspace/node_modules
      - gem_cache:/workspace/vendor/bundle
    environment:
      RAILS_ENV: development
      APP_ENV: development
      RACK_ENV: development
      DATABASE_HOST: db
      DATABASE_USER: root
      DATABASE_PASSWORD: password
      DATABASE_NAME: app_development
    tty: true
    stdin_open: true
    command: ['sleep', 'infinity']
    depends_on:
      - db

  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql

volumes:
  node_modules_cache:
  gem_cache:
  db_data:
