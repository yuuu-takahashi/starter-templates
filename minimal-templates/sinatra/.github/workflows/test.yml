# Generated by scripts/generate-configs.ts — edit shared/workflows/test-sinatra.yml instead.
name: Test

on:
  pull_request:
  push:
    branches: [main]
defaults:
  run:
    shell: bash
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    container:
      image: ruby:3.3.6

    env:
      APP_ENV: test
      RACK_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - name: Install dependencies
        run: |
          bundle config set --local path vendor/bundle
          bundle install

      - name: Run tests
        run: |
          bundle exec rspec
