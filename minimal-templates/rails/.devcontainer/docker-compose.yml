# Generated by scripts/generate-devcontainer.ts — edit shared/docker/docker-compose.rails.yml instead.
services:
  web:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        TZ: ${TZ:-UTC}
        CLAUDE_CODE_VERSION: latest
    # node_modules / vendor/bundle はワークスペースの bind のみ（anthropics/claude-code .devcontainer と同様。）
    volumes:
      - ..:/workspace
    environment:
      RAILS_ENV: development
      BUNDLER_VERSION: 2.3.7
    tty: true
    stdin_open: true
    # sleep infinity: postStart（ファイアウォール）より先に yarn/bundle が落ちてコンテナが止まるのを防ぐ。
    # 依存インストールは CI の devcontainer exec またはローカルで実行する。
    command: ['sleep', 'infinity']
