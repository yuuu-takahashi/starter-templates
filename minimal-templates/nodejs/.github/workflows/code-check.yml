# Generated by scripts/generate-configs.ts — edit shared/workflows/code-check-node.yml instead.
name: Code Check

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-yarn

      - name: format
        run: yarn format

      - name: lint
        run: yarn lint
